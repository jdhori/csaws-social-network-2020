name: Deploy accessible edition to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Assemble static site
        run: |
          mkdir -p _site/document _site/docs
          # Accessible landing page (links to all three formats) is the index
          cp index.html _site/index.html
          # Publish the three deliverables under /document, matching the repo layout
          cp document/CSaWS_SocialNetwork.html _site/document/
          cp document/CSaWS_SocialNetwork.md _site/document/
          cp document/CSaWS_SocialNetwork_accessible.pdf _site/document/
          # Supporting docs linked from the landing page
          cp docs/ACCESSIBILITY.md _site/docs/ 2>/dev/null || true
          cp NOTICE.md _site/ 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
