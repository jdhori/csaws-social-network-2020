name: Deploy accessible edition to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Assemble static site
        run: |
          mkdir -p _site
          # Self-contained accessible HTML becomes the landing page
          cp document/CSaWS_SocialNetwork.html _site/index.html
          # Make the Markdown and tagged PDF/UA-1 downloadable alongside it
          cp document/CSaWS_SocialNetwork.md _site/ 2>/dev/null || true
          cp document/CSaWS_SocialNetwork_accessible.pdf _site/ 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
